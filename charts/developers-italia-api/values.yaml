# Default values for developers-italia-api.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: ghcr.io/italia/developers-italia-api
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

deploymentAnnotations: {}

podAnnotations: {}

podSecurityContext:
  {}
  # fsGroup: 2000

securityContext:
  {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: ""
  annotations:
    {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources:
  {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

# -- (int) Max number of requests.
maxRequests:

# -- (string) Name of existing Kubernetes secret containing keys 'databaseDSN'
# and 'pasetoKey'. If not provided, a secret will be generated using values
# from 'databaseDSN' and 'pasetoKey'.
useExistingSecret:

# -- Database connection string. Accepts both key=value format
# (e.g. "host=myhost port=5432 dbname=mydb user=myuser password=mypassword sslmode=require")
# and URL format (e.g. "postgres://user:password@host:5432/dbname?sslmode=require").
# Note: in key=value format, values containing spaces are not supported.
# Use URL format if the password contains spaces or special characters.
databaseDSN: ""

# -- Base64 encoded Paseto Key.
pasetoKey: ""

# -- (string) Atlas migration baseline version. Set to the latest migration
# version (e.g. "20231001000000") when first deploying this chart against an
# existing database that was previously managed by GORM AutoMigrate. Atlas will
# record all migrations up to this version as applied without running their SQL.
# Leave empty for new databases or after Atlas has already been initialized.
migrationBaseline: ""

serviceMonitor:
  # -- Create ServiceMonitor resource (requires corresponding Prometheus Operator CRD installed).
  enabled: false
  additionalLabels: {}
  # -- (string) Defaults to the name of the Kubernetes service (details [here](https://prometheus-operator.dev/docs/operator/api/#monitoring.coreos.com/v1.ServiceMonitor)).
  jobLabel:
  # -- (string) Interval at which metrics should be scraped (uses Prometheus default if unspecified, details [here](https://prometheus-operator.dev/docs/operator/api/#monitoring.coreos.com/v1.Endpoint))
  interval:
  # -- (string) Timeout after which the scrape is ended (uses Prometheus default if unspecified, details [here](https://prometheus-operator.dev/docs/operator/api/#monitoring.coreos.com/v1.Endpoint)).
  scrapeTimeout:
  targetLabels: []

extraVolumes: []

extraVolumeMounts: []
