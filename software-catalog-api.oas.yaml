  /catalogs:
    get:
      summary: List all Catalogs
      description: List all active Catalogs
      tags:
        - catalogs
      operationId: list-catalogs
      parameters:
        - schema:
            type: boolean
            default: false
          in: query
          name: all
          description: 'Show all catalogs, even the ones with "active" set to false'
          example: false
        - schema:
