            application/json:
              schema:
                $ref: '#/components/schemas/Webhook'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
    patch:
      summary: Update a Webhook
      description: Update a Webhook by its id
      tags:
        - webhooks
      security:
        - bearerAuth: []
      operationId: update-webhooks-webhookId
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Webhook'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '429':
          $ref: '#/components/responses/TooManyRequests'
      requestBody:
        required: true
        content:
          application/merge-patch+json:
            schema:
              $ref: '#/components/schemas/Webhook'
    delete:
      summary: Delete a Webhook
      description: Delete a Webhook by its id
      tags:
        - webhooks
      security:
        - bearerAuth: []
      operationId: remove-webhooks-webhookId
      responses:
        '204':
          $ref: '#/components/responses/NoContent'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
components:
  callbacks:
    ResourceCreate:
      '{$request.body#/url}':
        post:
          description: The webhook called when a new resource is created
          requestBody:
            required: true
            content:
              application/json:
                schema:
                  type: object
                  additionalProperties: false
                  properties:
                    event:
                      type: string
                      description: The type of event that triggered the webhook (always "create")
                      enum: [create]
                    subject:
                      type: string
                      pattern: '.*'
                      maxLength: 255
                      description: The resource the event occurred on
                      example: "/software/0000-1111-2222-3333"
                  required:
                    - event
                    - subject
          responses:
            '204':
              description: Callback successfully processed
    ResourceUpdate:
      '{$request.body#/url}':
        post:
          description: The webhook called when a resource is updated
          requestBody:
            required: true
            content:
              application/json:
                schema:
                  type: object
                  additionalProperties: false
                  properties:
                    event:
                      type: string
                      description: The type of event that triggered the webhook (always "update")
                      enum: [update]
                    subject:
                      type: string
                      pattern: '.*'
                      maxLength: 255
                      description: The resource the event occurred on
                      example: "/software/0000-1111-2222-3333"
                  required:
                    - event
                    - subject
          responses:
            '204':
              description: Callback successfully processed
    ResourceDelete:
      '{$request.body#/url}':
        post:
          description: The webhook called when a resource is deleted
          requestBody:
            required: true
            content:
              application/json:
                schema:
                  type: object
                  additionalProperties: false
                  properties:
                    event:
                      type: string
                      description: The type of event that triggered the webhook (always "delete")
                      enum: [delete]
                    subject:
                      type: string
                      pattern: '.*'
                      maxLength: 255
                      description: The resource the event occurred on
                      example: "/software/0000-1111-2222-3333"
                  required:
                    - event
                    - subject
          responses:
            '204':
              description: Callback successfully processed

  responses:
    NoContent:
      description: No Content
    BadRequest:
      description: Bad Request
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Unauthorized
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Error'
    Conflict:
      description: Conflict
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Not found
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Error'
    UnprocessableEntity:
      description: Unprocessable Entity
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ValidationError'
    TooManyRequests:
      description: Too Many Requests
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Error'
  schemas:
    AnalysisData:
      title: AnalysisData
      type: object
      nullable: true
      description: >
        Analysis data produced by external components (scanners, enrichers,
        security checkers, etc.). Each key is a namespace owned by the
        component that writes it. Each namespace value is a JSON object
        with at least a required version field "v".
      additionalProperties:
        type: object
        required:
          - v
        properties:
          v:
            type: integer
            format: int32
            minimum: 1
            maximum: 999
            description: Schema version of this namespace.
            example: 1
          t:
            type: string
            format: date-time
            readOnly: true
            description: Timestamp of the last write (RFC 3339 datetime).
            example: '2024-01-15T10:30:00Z'
        additionalProperties: true
      example:
        acme-security-scanner:
          v: 1
          t: "2024-01-15T10:30:00Z"
          vulnerabilities: 0
          grade: "A"
    JsonPatchRequest:
      title: JsonPatchRequest
      type: array
      description: >
        A JSON Patch document as defined by RFC 6902.
        Writable fields are: publiccodeYml, url, aliases, active, vitality, analysis.
      example:
        - op: replace
          path: /publiccodeYml
          value: "name: My Software"
        - op: replace
          path: /vitality
          value: "90,100,94,12"
        - op: add
          path: /aliases/-
          value: "https://github.com/example/old-repo"
        - op: replace
          path: /active
          value: false
      items:
        type: object
        additionalProperties: false
        required:
          - op
          - path
        properties:
          op:
            type: string
            description: The operation to perform
            example: replace
            enum:
              - add
              - remove
              - replace
              - test
          path:
            type: string
            description: >
              A JSON Pointer (RFC 6901) to a writable field.
              Examples: /publiccodeYml, /url, /active, /vitality, /analysis,
              /aliases (full replace), /aliases/- (append), /aliases/0 (by index).
            example: '/publiccodeYml'
          value:
            description: The value to set. Required for add, replace, and test operations.
            example: 'name: My Software'
          from:
            type: string
            description: Source JSON Pointer, used by move and copy operations.
            example: '/aliases/0'
    Software:
      title: Software
      type: object
      additionalProperties: false
      properties:
        id:
          type: string
          maxLength: 36
          pattern: '[a-f0-9]{8}-[a-f0-9]{4}-4[a-f0-9]{3}-[89aAbB][a-f0-9]{3}-[a-f0-9]{12}'
          description: Unique identifier of the Software
          example: 'c353756e-8597-4e46-a99b-7da2e141603b'
          readOnly: true
        publiccodeYml:
          type: string
          minLength: 1
          maxLength: 99999
          pattern: '.*'
          description: Raw publiccode.yml content for this software
          example: "publiccodeYmlVersion: '0.2'\nname: My Software\n"
        url:
          type: string
          format: uri
          minLength: 1
          maxLength: 255
          description: >
            Repository URL this software is available at.
            This is the current and canonical one.
          example: 'https://github.com/example/my-software'
        aliases:
          type: array
          description: >
            List of aliases for the current repository URL.
            This is useful to keep track, for example, of previous addresses that redirect
            to the current one.
          example: ['https://github.com/example/old-repo']
          minItems: 1
          maxItems: 255
          items:
            type: string
            format: uri
            minLength: 1
            maxLength: 255
        active:
          type: boolean
          description: >
            Whether this Software is active or not. This is useful to temporarly disable
            software (fe. when the repository is empty or there's something malicious going on,
            but the problem is expected to be fixed in the near future) without removing it.
          default: true
          example: true
        vitality:
          type: string
          description: >
            The vitality of the software repository, indicating
            health, activity, or metrics relevant to its condition.
            This is a opaque string, and users of the API can choose their
            own format.

            The Italian catalog, for example, uses comma-separated values for
            daily vitality scores (0-100) (see https://github.com/italia/publiccode-crawler/blob/main/vitality-ranges.yml).
          minLength: 1
          maxLength: 99999
          pattern: '.*'
          example: "90,100,94,12"
        catalogId:
          type: string
          maxLength: 36
          pattern: '[a-f0-9]{8}-[a-f0-9]{4}-4[a-f0-9]{3}-[89aAbB][a-f0-9]{3}-[a-f0-9]{12}'
          description: >
            The ID of the catalog this software belongs to.
            If absent, the software belongs to the root (implicit) catalog.
          example: 'a1b2c3d4-e5f6-4789-abcd-ef0123456789'
          readOnly: true
        createdAt:
          type: string
          format: date-time
          example: '2022-06-07T14:56:23Z'
          description: The time the log was created (RFC 3339 datetime)
          readOnly: true
        updatedAt:
          type: string
          format: date-time
          example: '2022-06-07T14:56:23Z'
          description: The time the log was updated (RFC 3339 datetime)
          readOnly: true
      required:
        - id
        - url
        - publiccodeYml
        - createdAt
        - updatedAt
    Catalog:
      title: Catalog
      type: object
      additionalProperties: false
      properties:
        id:
          type: string
          maxLength: 36
          pattern: '[a-f0-9]{8}-[a-f0-9]{4}-4[a-f0-9]{3}-[89aAbB][a-f0-9]{3}-[a-f0-9]{12}'
          description: Unique identifier of the Catalog
          example: 'a1b2c3d4-e5f6-4789-abcd-ef0123456789'
          readOnly: true
        name:
          type: string
          minLength: 1
          maxLength: 255
          description: Human-readable name of the catalog
          example: 'Public Software Catalog'
        alternativeId:
          type: string
          description: >
            Optional alternative user-provided identifier for this Catalog.
            If present, you can use it in place of the Catalog `id` as a path argument.
          maxLength: 255
          example: 'example-catalog'
        active:
          type: boolean
          description: Whether this Catalog is active or not
          default: true
          example: true
        publishersNamespace:
          type: string
          maxLength: 255
          description: >
            Namespace prefix for publisher organisation
            validation. When set, consumers can check that
            each publiccode.yml organisation field equals
            this prefix + the publisher alternativeId.
          example: 'urn:x-italian-pa:'
        sources:
          type: array
          minItems: 1
          maxItems: 100
          description: >
            Data sources for this catalog. At least one is
            required on creation.
          example:
            - url: 'https://github.com/example-org'
              driver: 'github'
          items:
            $ref: '#/components/schemas/CatalogSource'
        createdAt:
          type: string
          format: date-time
          example: '2022-06-07T14:56:23Z'
          description: The time the catalog was created (RFC 3339 datetime)
          readOnly: true
        updatedAt:
          type: string
          format: date-time
          example: '2022-06-07T14:56:23Z'
          description: The time the catalog was updated (RFC 3339 datetime)
          readOnly: true
      required:
        - id
        - name
        - sources
        - createdAt
        - updatedAt
    CatalogSource:
      title: CatalogSource
      type: object
      additionalProperties: false
      properties:
        driver:
          type: string
          maxLength: 64
          description: >
            Driver used to crawl this source.
          example: 'github'
        url:
          type: string
          format: uri
          maxLength: 2048
          description: URL of this catalog source
          example: 'https://github.com/org'
        args:
          type: array
          description: >
            Optional arguments for the driver (e.g. a JSON
            configuration file URL).
          example: ['https://example.org/config.json']
          items:
            type: string
            minLength: 1
      required:
        - url
    Publisher:
      title: Publisher
      type: object
      additionalProperties: false
      properties:
        id:
          type: string
          maxLength: 36
          pattern: '[a-f0-9]{8}-[a-f0-9]{4}-4[a-f0-9]{3}-[89aAbB][a-f0-9]{3}-[a-f0-9]{12}'
          description: Unique identifier of the Publisher
          example: '2ded32eb-c45e-4167-9166-a44e18b8adde'
          readOnly: true
        codeHosting:
          type: array
          description: List of code hosting sources for this publisher
          example:
            - url: 'https://github.com/my-org/'
              group: true
              createdAt: '2022-06-07T14:56:23Z'
              updatedAt: '2022-06-07T14:56:23Z'
          minItems: 1
          maxItems: 255
          items:
            type: object
            additionalProperties: false
            properties:
              url:
                type: string
                description: |
                  The HTTP URL for the repository or the group of repositories.
                format: uri
                maxLength: 255
                example: 'https://gitlab.example.org/my-group/'
              group:
                type: boolean
                description: |
                  Whether this code hosting URL is a group containing other repositories
                  (like GitHub's organizations and GitLab's groups) or not.
                default: true
              createdAt:
                type: string
                format: date-time
                example: '2022-06-07T14:56:23Z'
                description: The time the log was created (RFC 3339 datetime)
                readOnly: true
              updatedAt:
                type: string
                format: date-time
                example: '2022-06-07T14:56:23Z'
                description: The time the log was updated (RFC 3339 datetime)
                readOnly: true
            required:
              - url
              - createdAt
              - updatedAt
        description:
          type: string
          maxLength: 255
          pattern: '.*'
          description: Human-readable name or description of the Publisher
          example: 'Ministero dello Sviluppo Economico'
        email:
          type: string
          format: email
          maxLength: 255
          description: |
            A contact email address for this Publisher.
          example: contact@mypublisher.example.org
        active:
          type: boolean
          description: |
            Whether this Publisher is active or not. This is useful to temporarly disable
            publishers (fe. when they are not complying with some rule, but the problem is
            expected to be fixed in the near future) without removing them.
          default: true
          example: true
        alternativeId:
          type: string
          description: |
            Optional alternative user-provided identifier for this Publisher.

            If present, you can use it in place of the Publisher `id` as path query
            argument.

            This is useful for example if this Publisher has another id or code in a
            different database.
          maxLength: 255
          example: 'ID-1234'
          pattern: '.*'
        createdAt:
          type: string
          format: date-time
          example: '2022-06-07T14:56:23Z'
          description: The time the publisher was created (RFC 3339 datetime)
          readOnly: true
        catalogId:
          type: string
          maxLength: 36
          pattern: '[a-f0-9]{8}-[a-f0-9]{4}-4[a-f0-9]{3}-[89aAbB][a-f0-9]{3}-[a-f0-9]{12}'
          description: >
            The ID of the catalog this publisher belongs to.
            If absent, the publisher belongs to the root (implicit) catalog.
          example: 'a1b2c3d4-e5f6-4789-abcd-ef0123456789'
          readOnly: true
        updatedAt:
          type: string
          format: date-time
          example: '2022-06-07T14:56:23Z'
          description: The time the publisher was updated (RFC 3339 datetime)
          readOnly: true
      required:
        - id
        - description
        - codeHosting
        - createdAt
        - updatedAt
    Log:
      title: Log
      type: object
      additionalProperties: false
      properties:
        id:
          type: string
          maxLength: 36
          pattern: '[a-f0-9]{8}-[a-f0-9]{4}-4[a-f0-9]{3}-[89aAbB][a-f0-9]{3}-[a-f0-9]{12}'
          description: Unique identifier of the Log
          example: '12f30d9e-042e-41ed-8ddc-d8bbc146d165'
          readOnly: true
        createdAt:
          type: string
          format: date-time
          example: '2022-06-07T14:56:23Z'
          description: The time the log was created (RFC 3339 datetime)
          readOnly: true
        updatedAt:
          type: string
          format: date-time
          example: '2022-06-07T14:56:23Z'
          description: The time the log was updated (RFC 3339 datetime)
          readOnly: true
        message:
          type: string
          maxLength: 2048
          pattern: '.*'
          description: Human-readable description of the log event
          example: 'Bad publiccode.yml: missing required field "name"'
        entity:
          type: string
          maxLength: 255
          pattern: '.*'
          description: >
            The resource this log is about (fe. a particular Publisher / Software).
            It might be absent if the log is not about a specific resource or if
            the resource doesn't exist yet, like in case of the error log caused by
            failure to create it.
          example: /software/7589be36-f046-45c6-9223-b7de9dbf06cd
          readOnly: true
      required:
        - id
        - createdAt
        - updatedAt
        - message
    Links:
      type: object
      additionalProperties: false
      x-examples: {}
      properties:
        prev:
          type: string
          format: base64
          minLength: 1
          maxLength: 255
          description: Cursor pointing to the previous page of results, null if on the first page
          example: 'WyIyMDIyLTA2LTA3VDE0OjU2OjIzWiIsImJmZjEyMzQ1Il0='
          readOnly: true
          nullable: true
        next:
          type: string
          format: base64
          minLength: 1
          maxLength: 255
          description: Cursor pointing to the next page of results, null if on the last page
          example: 'WyIyMDIyLTA2LTA3VDE0OjU2OjIzWiIsImFhYTEyMzQ1Il0='
          readOnly: true
          nullable: true
      required:
        - prev
        - next
      readOnly: true
    Error:
      type: object
      additionalProperties: false
      x-examples:
        example-1:
          title: Can't create Software
          detail: Invalid JSON
          status: 400
      properties:
        title:
          type: string
          pattern: '.*'
          maxLength: 255
          description: 'Short, human-readable summary of the problem'
          example: "can't create Software"
        detail:
          type: string
          pattern: '.*'
          maxLength: 2048
          description: Human-readable explanation of the problem
          example: 'invalid or malformed JSON'
        status:
          type: integer
          format: int32
          minimum: 400
          maximum: 499
          description: The HTTP status code for this problem
          example: 400
      required:
        - title
        - detail
    ValidationError:
      type: object
      additionalProperties: false
      x-examples:
        example-1:
          title: Can't create Log
          detail: Validation error
          status: 422
          validationErrors:
            - field: message
              rule: required
              value: ''
      properties:
        title:
          type: string
          pattern: '.*'
          maxLength: 255
          description: 'Short, human-readable summary of the problem'
          example: "can't create Log"
        detail:
          type: string
          pattern: '.*'
          maxLength: 2048
          description: Human-readable explanation of the problem
          example: 'invalid format: message is required'
        status:
          type: integer
          format: int32
          # TODO: use enum
          minimum: 422
          maximum: 422
          description: The HTTP status code for this problem
          example: 422
        validationErrors:
          type: array
          description: 'List of validation errors, returned by endpoints that validate input data (eg. POST, PATCH, etc.)'
          example:
            - field: message
              rule: required
              value: ''
          minItems: 1
          maxItems: 10
          items:
            type: object
            additionalProperties: false
            description: Details of the occurred validation error
            properties:
              field:
                type: string
                maxLength: 64
                pattern: '[A-Za-z]{1,64}'
                description: Field name with a validation error
                example: name
              rule:
                type: string
                maxLength: 64
                pattern: '[A-Za-z]{1,64}'
                description: Rule that makes the provided field invalid
                example: required
              value:
                type: string
                maxLength: 255
                pattern: '.*'
                description: |
                  The invalid value provided
                example: '""'
            required:
              - field
              - rule
              - value
      required:
        - title
        - detail
    Webhook:
      title: Webhook
      type: object
      additionalProperties: false
      properties:
        id:
          type: string
          maxLength: 36
          pattern: '[a-f0-9]{8}-[a-f0-9]{4}-4[a-f0-9]{3}-[89aAbB][a-f0-9]{3}-[a-f0-9]{12}'
          description: Unique identifier of the Webhook
          example: '007bc84a-7e2d-43a0-b7e1-a256d4114aa7'
          readOnly: true
        url:
          type: string
          format: uri
          maxLength: 255
          example: 'https://example.org/my-webhook-endpoint'
          description: URL where the webhook payload will be delivered to
        secret:
          type: string
          maxLength: 255
          pattern: '.*'
          description: |
            Secret used to authenticate to the webhook endpoint
          example: 'my-secret-token'
        createdAt:
          type: string
          description: The time the webhook was created (RFC 3339 datetime)
          format: date-time
          example: '2022-06-07T14:56:23Z'
          readOnly: true
        updatedAt:
          type: string
          format: date-time
          example: '2022-06-07T14:56:23Z'
          description: The time the webhook was updated (RFC 3339 datetime)
          readOnly: true
      required:
        - id
        - url
        - createdAt
        - updatedAt
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: PASETO
