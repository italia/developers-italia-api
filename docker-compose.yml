version: '3.9'
services:
  migrate:
    image: arigaio/atlas:v1.1.0
    command: >
      migrate apply
      --url "postgres://postgres:postgres@db:5432/postgres?sslmode=disable"
      --dir "file:///migrations"
      --tx-mode file
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./internal/database/migrations:/migrations

  api:
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - default
    volumes:
      - .:/opt/app/api
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_DSN: 'host=db user=postgres password=postgres dbname=postgres port=5432'
      ENVIRONMENT: local

  db:
    image: postgres:14.3-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
